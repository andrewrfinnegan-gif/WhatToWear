name: Deploy web demo

# Publishes the Expo web build to GitHub Pages as a no-install demo. The app
# runs in offline mode (no EXPO_PUBLIC_API_URL), so the closet, weather, and
# outfit suggestions work via the on-device engine; AI/login/purchases (backend
# features) are intentionally off in this static demo.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - run: npm ci --no-audit --no-fund
      - name: Build web
        run: npx expo export --platform web
        env:
          EXPO_BASE_URL: ${{ steps.pages.outputs.base_path }}
      - name: SPA fallback + disable Jekyll
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
